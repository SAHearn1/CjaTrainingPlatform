name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type-check, Lint & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      # Lint runs and reports issues; pre-existing violations are tracked but do
      # not block PRs. Once the backlog of pre-existing issues is cleared, remove
      # `continue-on-error` so new violations fail the build immediately.
      - name: Lint
        id: lint
        run: |
          mkdir -p reports
          npm run lint > reports/eslint.txt 2>&1
        continue-on-error: true

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: reports/eslint.txt
          if-no-files-found: error

      - name: Add lint summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Lint"
            echo
            if [ "${{ steps.lint.outcome }}" = "success" ]; then
              echo "Lint passed."
            else
              echo "Lint reported issues. See the \`eslint-report\` artifact for the full output."
              echo
              echo "Backlog plan: docs/LINT_HYGIENE_PLAN.md"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Test
        run: npm run test -- --run

      - name: Build
        run: npm run build
        env:
          # Vite reads these at build time; supply empty stubs so the build
          # doesn't fail when real secrets are absent in CI.
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder

  deploy-edge-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        run: |
          supabase functions deploy make-server-39a35780 \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel (production)
        run: |
          npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            --yes
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
